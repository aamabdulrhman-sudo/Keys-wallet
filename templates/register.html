<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #0f172a; display: flex; align-items: center; min-height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .register-container { width: 100%; max-width: 420px; padding: 15px; margin: auto; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .form-control { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 12px; }
        .form-control:focus { background: #0f172a; border-color: #22c55e; color: #e2e8f0; box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }
        .input-group-text { background: #334155; border: 1px solid #334155; color: #94a3b8; border-radius: 12px 0 0 12px; }
        .form-label { color: #94a3b8; font-weight: 500; }
        .btn-success { background: linear-gradient(135deg, #22c55e, #16a34a); border: none; border-radius: 12px; padding: 12px; font-weight: 700; transition: all 0.3s ease; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(34,197,94,0.4); }
        .text-gradient { background: linear-gradient(135deg, #22c55e, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .alert { border-radius: 12px; }
    </style>
</head>
<body>

<div class="register-container">
    <div class="card p-4">
        <div class="text-center mb-4">
            <div class="display-4 text-gradient mb-2"><i class="bi bi-person-plus-fill"></i></div>
            <h3 class="fw-bold text-gradient">إنشاء حساب جديد</h3>
            <p class="text-muted">انضم إلى مجتمع Vault Secure</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert"
                   style="background: {{ '#450a0a' if category == 'danger' else '#1e293b' }}; border-color: {{ '#7f1d1d' if category == 'danger' else '#334155' }}; color: #e2e8f0;">
                <i class="bi {{ 'bi-exclamation-triangle-fill me-2' if category == 'danger' else 'bi-check-circle-fill me-2' }}"></i>
                {{ message }}
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">اسم المستخدم</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="اختر اسم مستخدم" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">كلمة المرور</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="اختر كلمة مرور قوية" required>
                </div>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-success btn-lg">
                    <i class="bi bi-person-plus me-1"></i> إنشاء الحساب
                </button>
            </div>
        </form>
        
        <div class="text-center mt-4">
            <p class="mb-0 small text-muted">لديك حساب بالفعل؟ <a href="{{ url_for('login') }}" class="text-decoration-none" style="color: #22c55e;">سجّل الدخول</a></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
